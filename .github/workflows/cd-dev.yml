name: CD Dev

on:
    workflow_run:
        workflows:
            - CI
        types:
            - completed
        branches:
            - main

permissions:
    contents: read
    packages: write

concurrency:
    group: cd-dev-${{ github.event.workflow_run.head_branch }}
    cancel-in-progress: false

jobs:
    build-and-push:
        name: Build and push image
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        runs-on: ubuntu-latest

        outputs:
            short_sha: ${{ steps.commit.outputs.short_sha }}
            is_release: ${{ steps.release.outputs.is_release }}
            version: ${{ steps.release.outputs.version }}

        steps:
            - name: Checkout tested commit
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.workflow_run.head_sha }}
                  fetch-depth: 0

            - name: Get commit SHA
              id: commit
              shell: bash
              run: |
                  set -euo pipefail
                  
                  SHORT_SHA="$(git rev-parse --short=7 HEAD)"
                  
                  echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
                  echo "Commit SHA: $SHORT_SHA"

            - name: Detect release commit
              id: release
              shell: bash
              run: |
                  set -euo pipefail
                  
                  COMMIT_MESSAGE="$(git log -1 --pretty=%s)"
                  PACKAGE_VERSION="$(node -p "require('./package.json').version")"
                  VERSION="v${PACKAGE_VERSION}"
                  EXPECTED_MESSAGE="chore(release): ${VERSION}"
                  
                  IS_RELEASE=false
                  
                  if [ "$COMMIT_MESSAGE" = "$EXPECTED_MESSAGE" ]; then
                    IS_RELEASE=true
                  fi
                  
                  echo "Commit message: $COMMIT_MESSAGE"
                  echo "Package version: $PACKAGE_VERSION"
                  echo "Release commit: $IS_RELEASE"
                  
                  echo "is_release=$IS_RELEASE" >> "$GITHUB_OUTPUT"
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"

            - name: Login to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: ghcr.io/${{ github.repository }}
                  tags: |
                      type=raw,value=sha-${{ steps.commit.outputs.short_sha }}
                      type=raw,value=latest

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Build and push Docker image
              uses: docker/build-push-action@v7
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}

    deploy-dev:
        name: Deploy dev
        runs-on: ubuntu-latest
        needs:
            - build-and-push

        environment: dev

        steps:
            - name: Checkout tested commit
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.workflow_run.head_sha }}

            - name: Copy deploy script
              uses: ./.github/actions/copy-script
              with:
                  vps_host: ${{ secrets.VPS_HOST }}
                  vps_user: ${{ secrets.VPS_USER }}
                  vps_ssh_key: ${{ secrets.VPS_SSH_KEY }}

            - name: Deploy application to dev
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  port: 22
                  script: |
                      bash /opt/finance/.github/scripts/deploy-environment.sh \
                        dev \
                        "ghcr.io/tema-pomortsev/finance:sha-${{ needs.build-and-push.outputs.short_sha }}" \
                        finance-dev \
                        .env.dev \
                        compose.dev.yml

    publish-release:
        name: Publish release
        if: ${{ needs.build-and-push.outputs.is_release == 'true' }}
        runs-on: ubuntu-latest

        needs:
            - build-and-push
            - deploy-dev

        permissions:
            contents: write
            packages: write

        steps:
            - name: Checkout release commit
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.workflow_run.head_sha }}
                  fetch-depth: 0

            - name: Login to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Add version tag to Docker image
              env:
                  SOURCE_IMAGE: ghcr.io/tema-pomortsev/finance:sha-${{ needs.build-and-push.outputs.short_sha }}
                  VERSION_IMAGE: ghcr.io/tema-pomortsev/finance:${{ needs.build-and-push.outputs.version }}
              shell: bash
              run: |
                  set -euo pipefail
                  
                  echo "Source image: $SOURCE_IMAGE"
                  echo "Version image: $VERSION_IMAGE"
                  
                  docker pull "$SOURCE_IMAGE"
                  docker tag "$SOURCE_IMAGE" "$VERSION_IMAGE"
                  docker push "$VERSION_IMAGE"

            - name: Create Git tag
              env:
                  VERSION: ${{ needs.build-and-push.outputs.version }}
              shell: bash
              run: |
                  set -euo pipefail
                  
                  git fetch --tags
                  
                  CURRENT_SHA="$(git rev-parse HEAD)"
                  
                  if git rev-parse "${VERSION}^{commit}" >/dev/null 2>&1; then
                    TAG_SHA="$(git rev-parse "${VERSION}^{commit}")"
                  
                    if [ "$TAG_SHA" != "$CURRENT_SHA" ]; then
                      echo "Tag $VERSION already points to another commit"
                      exit 1
                    fi
                  
                    echo "Tag $VERSION already exists on the correct commit"
                  else
                    git config user.name "github-actions[bot]"
                    git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  
                    git tag -a "$VERSION" -m "Release $VERSION"
                    git push origin "$VERSION"
                  fi

            - name: Create GitHub Release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  VERSION: ${{ needs.build-and-push.outputs.version }}
              shell: bash
              run: |
                  set -euo pipefail
                  
                  if gh release view "$VERSION" >/dev/null 2>&1; then
                    echo "GitHub Release $VERSION already exists"
                  else
                    gh release create "$VERSION" \
                      --title "$VERSION" \
                      --generate-notes
                  fi

            - name: Write release summary
              env:
                  VERSION: ${{ needs.build-and-push.outputs.version }}
                  SHORT_SHA: ${{ needs.build-and-push.outputs.short_sha }}
              shell: bash
              run: |
                  {
                    echo "## Release published"
                    echo
                    echo "Version: \`$VERSION\`"
                    echo
                    echo "Commit: \`$SHORT_SHA\`"
                    echo
                    echo "Docker image:"
                    echo
                    echo "\`ghcr.io/tema-pomortsev/finance:$VERSION\`"
                  } >> "$GITHUB_STEP_SUMMARY"

    deploy-qa:
        name: Deploy release to QA
        if: ${{ needs.build-and-push.outputs.is_release == 'true' }}
        runs-on: ubuntu-latest

        needs:
            - build-and-push
            - publish-release

        environment: qa

        steps:
            - name: Checkout release commit
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.workflow_run.head_sha }}

            - name: Copy deploy script
              uses: ./.github/actions/copy-script
              with:
                  vps_host: ${{ secrets.VPS_HOST }}
                  vps_user: ${{ secrets.VPS_USER }}
                  vps_ssh_key: ${{ secrets.VPS_SSH_KEY }}

            - name: Deploy release to QA
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  port: 22
                  script: |
                      bash /opt/finance/.github/scripts/deploy-environment.sh \
                        qa \
                        "ghcr.io/tema-pomortsev/finance:${{ needs.build-and-push.outputs.version }}" \
                        finance-qa \
                        .env.qa \
                        compose.qa.yml

    deploy-prod:
        name: Deploy release to production
        if: ${{ needs.build-and-push.outputs.is_release == 'true' }}
        runs-on: ubuntu-latest

        needs:
            - build-and-push
            - deploy-qa

        environment: production

        concurrency:
            group: production-deploy
            cancel-in-progress: false

        steps:
            - name: Checkout release commit
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.workflow_run.head_sha }}

            - name: Copy deploy script
              uses: ./.github/actions/copy-script
              with:
                  vps_host: ${{ secrets.VPS_HOST }}
                  vps_user: ${{ secrets.VPS_USER }}
                  vps_ssh_key: ${{ secrets.VPS_SSH_KEY }}

            - name: Deploy release to production
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  port: 22
                  script: |
                      bash /opt/finance/.github/scripts/deploy-environment.sh \
                        prod \
                        "ghcr.io/tema-pomortsev/finance:${{ needs.build-and-push.outputs.version }}" \
                        finance-prod \
                        .env.prod \
                        compose.prod.yml