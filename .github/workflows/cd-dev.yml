name: CD
on:
    workflow_run:
        workflows:
            - CI
        types:
            - completed
        branches:
            - main

permissions:
    contents: read
    packages: write

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        outputs:
            short_sha: ${{ steps.commit.outputs.short_sha }}

        steps:
            -   uses: actions/checkout@v7
            -   name: Get short SHA
                id: commit
                run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            -   name: Login to ghcr
                uses: docker/login-action@v4
                with:
                    registry: ghcr.io
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}
            -   name: Extract Docker metadata
                id: meta
                uses: docker/metadata-action@v6
                with:
                    images: ghcr.io/${{ github.repository }}
                    tags: |
                        type=sha
                        type=raw,value=latest
            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@v4
            -   name: Build and push Docker
                uses: docker/build-push-action@v7
                with:
                    context: .
                    push: true
                    tags: ${{ steps.meta.outputs.tags }}
                    labels: ${{ steps.meta.outputs.labels }}

    deploy:
        name: Deploy dev
        runs-on: ubuntu-latest
        needs: build-and-push

        steps:
            -   uses: actions/checkout@v7
            -   uses: ./.github/actions/copy-script
                with:
                    vps_host: ${{ secrets.VPS_HOST }}
                    vps_user: ${{ secrets.VPS_USER }}
                    vps_ssh_key: ${{ secrets.VPS_SSH_KEY }}
            -   name: Deploy application to dev stand
                uses: appleboy/ssh-action@v1
                with:
                    host: ${{ secrets.VPS_HOST }}
                    username: ${{ secrets.VPS_USER }}
                    key: ${{ secrets.VPS_SSH_KEY }}
                    port: 22
                    script: |
                        script: |
                            chmod +x /opt/finance/.github/scripts/deploy-environment.sh
                            
                            /opt/finance/.github/scripts/deploy-environment.sh \
                                dev \
                                "ghcr.io/tema-pomortsev/finance:sha-${{ needs.build-and-push.outputs.short_sha }}" \
                                finance-dev \
                                .env.dev \
                                compose.dev.yml