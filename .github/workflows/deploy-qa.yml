name: deploy-qa.yml
on:
    workflow_dispatch:

jobs:
    deploy-qa:
        runs-on: ubuntu-latest
        environment: qa

        steps:
            -   uses: actions/checkout@v7
            -   uses: ./.github/actions/copy-script
                with:
                    vps_host: ${{ secrets.VPS_HOST }}
                    vps_user: ${{ secrets.VPS_USER }}
                    vps_ssh_key: ${{ secrets.VPS_SSH_KEY }}

            -   name: Deploy QA
                uses: appleboy/ssh-action@v1
                with:
                    host: ${{ secrets.VPS_HOST }}
                    username: ${{ secrets.VPS_USER }}
                    key: ${{ secrets.VPS_SSH_KEY }}
                    port: 22
                    script: |
                        cd /opt/finance
    
                        IMAGE=$(grep '^FINANCE_IMAGE=' .env.dev | cut -d= -f2-)
                        
                        /opt/finance/.github/scripts/deploy-environment.sh \
                            qa \
                            "$IMAGE" \
                            finance-qa \
                            .env.qa \
                            compose.qa.yml