name: CD
on:
    push:
        branches:
            - main

permissions:
    contents: read
    packages: write

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        outputs:
            short_sha: ${{ steps.commit.outputs.short_sha }}

        steps:
            -   uses: actions/checkout@v7
            -   name: Get short SHA
                id: commit
                run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            -   name: Login to GCR
                uses: docker/login-action@v4
                with:
                    registry: ghcr.io
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}
            -   name: Extract Docker metadata
                id: meta
                uses: docker/metadata-action@v6
                with:
                    images: ghcr.io/${{ github.repository }}
                    tags: |
                        type=sha
                        type=raw,value=latest
            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@v4
            -   name: Build and push Docker
                uses: docker/build-push-action@v7
                with:
                    context: .
                    push: true
                    tags: ${{ steps.meta.outputs.tags }}
                    labels: ${{ steps.meta.outputs.labels }}

    deploy:
        runs-on: ubuntu-latest
        needs: build-and-push
        steps:
            -   name: Check SSH connection
                uses: appleboy/ssh-action@v1
                with:
                    host: ${{ secrets.VPS_HOST }}
                    username: ${{ secrets.VPS_USER }}
                    key: ${{ secrets.VPS_SSH_KEY }}
                    port: 22
                    script: |
                        set -e
                        
                        IMAGE="ghcr.io/tema-pomortsev/finance:sha-${{ needs.build-and-push.outputs.short_sha }}"
                        PREV_IMAGE=$(docker inspect --format='{{.Config.Image}}' finance 2>/dev/null || true)
                        
                        echo "Deploying: $IMAGE"
                        echo "Previous image: ${PREV_IMAGE:-none}"
                        
                        docker pull "$IMAGE"
                        
                        docker stop finance 2>/dev/null || true
                        docker rm finance 2>/dev/null || true
                        
                        docker run -d \
                          --name finance \
                          --restart unless-stopped \
                          -p 80:80 \
                          "$IMAGE"
                        
                        sleep 5
                        
                        if curl --fail --silent --show-error http://127.0.0.1/404 > /dev/null; then
                          echo "Healthcheck passed"
                        else
                          echo "Healthcheck failed"
                          docker logs finance || true
                        
                          docker stop finance || true
                          docker rm finance || true
                        
                          if [ -n "$PREV_IMAGE" ]; then
                            echo "Rolling back to $PREV_IMAGE"
                        
                            docker run -d \
                              --name finance \
                              --restart unless-stopped \
                              -p 80:80 \
                              "$PREV_IMAGE"
                          else
                            echo "No previous image available for rollback"
                          fi
                        
                          exit 1
                        fi
                        
                        docker ps --filter name=finance