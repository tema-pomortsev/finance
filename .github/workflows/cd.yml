name: CD
on:
    push:
        branches:
            - main

permissions:
    contents: read
    packages: write

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        outputs:
            short_sha: ${{ steps.commit.outputs.short_sha }}

        steps:
            -   uses: actions/checkout@v7
            -   name: Get short SHA
                id: commit
                run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            -   name: Login to GCR
                uses: docker/login-action@v4
                with:
                    registry: ghcr.io
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}
            -   name: Extract Docker metadata
                id: meta
                uses: docker/metadata-action@v6
                with:
                    images: ghcr.io/${{ github.repository }}
                    tags: |
                        type=sha
                        type=raw,value=latest
            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@v4
            -   name: Build and push Docker
                uses: docker/build-push-action@v7
                with:
                    context: .
                    push: true
                    tags: ${{ steps.meta.outputs.tags }}
                    labels: ${{ steps.meta.outputs.labels }}

    deploy:
        runs-on: ubuntu-latest
        needs: build-and-push
        steps:
            -   name: Check SSH connection
                uses: appleboy/ssh-action@v1
                with:
                    host: ${{ secrets.VPS_HOST }}
                    username: ${{ secrets.VPS_USER }}
                    key: ${{ secrets.VPS_SSH_KEY }}
                    port: 22
                    script: |
                        set -e
                        
                        IMAGE="ghcr.io/tema-pomortsev/finance:sha-${{ needs.build-and-push.outputs.short_sha }}"
                        
                        cd /opt/finance
                        
                        PREV_IMAGE=$(grep '^FINANCE_IMAGE=' .env | cut -d= -f2-)
                        
                        echo "Deploying $IMAGE"
                        echo "Previous image: $PREV_IMAGE"
                        
                        echo "FINANCE_IMAGE=$IMAGE" > .env
                        
                        docker compose pull
                        
                        if docker compose up -d --wait --wait-timeout 60; then
                            echo "Healthcheck passed"
                        else
                            echo "Deploy failed, rolling back"
                        
                            docker compose logs finance || true
                        
                            echo "FINANCE_IMAGE=$PREV_IMAGE" > .env
                        
                            docker compose pull
                            docker compose up -d --wait --wait-timeout 60
                        
                            exit 1
                        fi
                        
                        docker compose ps