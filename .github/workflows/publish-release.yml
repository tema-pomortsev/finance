name: Publish Release

run-name: Publish release from ${{ github.event.pull_request.head.ref }}

on:
    pull_request:
        branches:
            - main
        types:
            - closed

permissions:
    contents: write

concurrency:
    group: publish-release
    cancel-in-progress: false

jobs:
    publish-release:
        name: Create Git tag and GitHub Release

        if: >-
            github.event.pull_request.merged == true &&
            startsWith(github.event.pull_request.head.ref, 'release/v')

        runs-on: ubuntu-latest

        steps:
            - name: Checkout main branch
              uses: actions/checkout@v4
              with:
                  ref: main
                  fetch-depth: 0

            - name: Read package version
              id: version
              shell: bash
              run: |
                  set -euo pipefail
                  
                  VERSION=$(node --print "require('./package.json').version")
                  TAG="v${VERSION}"
                  
                  if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                    echo "Invalid package version: ${VERSION}"
                    exit 1
                  fi
                  
                  echo "Version: ${VERSION}"
                  echo "Tag: ${TAG}"
                  
                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
                  echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

            - name: Verify release branch version
              env:
                  TAG: ${{ steps.version.outputs.tag }}
                  RELEASE_BRANCH: ${{ github.event.pull_request.head.ref }}
              run: |
                  set -euo pipefail
                  
                  EXPECTED_BRANCH="release/${TAG}"
                  
                  if [[ "$RELEASE_BRANCH" != "$EXPECTED_BRANCH" ]]; then
                    echo "Release branch does not match package version"
                    echo "Expected: ${EXPECTED_BRANCH}"
                    echo "Actual:   ${RELEASE_BRANCH}"
                    exit 1
                  fi

            - name: Check that tag does not exist
              env:
                  TAG: ${{ steps.version.outputs.tag }}
              run: |
                  set -euo pipefail
                  
                  git fetch --tags --force
                  
                  if git rev-parse "$TAG" >/dev/null 2>&1; then
                    echo "Tag ${TAG} already exists"
                    exit 1
                  fi

            - name: Configure Git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            - name: Create and push Git tag
              env:
                  TAG: ${{ steps.version.outputs.tag }}
              run: |
                  set -euo pipefail
                  
                  git tag \
                    --annotate "$TAG" \
                    --message "Release ${TAG}"
                  
                  git push origin "$TAG"

            - name: Create GitHub Release
              env:
                  GH_TOKEN: ${{ github.token }}
                  TAG: ${{ steps.version.outputs.tag }}
              run: |
                  set -euo pipefail
                  
                  gh release create "$TAG" \
                    --verify-tag \
                    --title "$TAG" \
                    --generate-notes